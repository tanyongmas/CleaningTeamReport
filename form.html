<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบรายงานปฏิบัติงาน - เทศบาลตำบลตันหยงมัส</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #16a34a;
            --primary-dark: #15803d;
            --bg: #f0fdf4; 
            --text-main: #1e293b;
        }
        body { font-family: 'Sarabun', sans-serif; background-color: var(--bg); margin: 0; padding: 15px; color: var(--text-main); }
        .card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 500px; margin: auto; border-top: 4px solid var(--primary); }
        
        .header { text-align: center; margin-bottom: 20px; }
        .form-logo { width: 75px; height: 75px; object-fit: contain; margin-bottom: 12px; border-radius: 50%; background: white; padding: 3px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header h2 { color: var(--primary-dark); margin: 0; font-size: 1.4rem; font-weight: bold; }
        
        .user-box { background: #f8fafc; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .status-loading { text-align: center; color: #64748b; font-weight: 600; font-size: 0.9rem; }
        .status-success { text-align: center; color: var(--primary); font-weight: 600; font-size: 0.95rem; margin-bottom: 8px; }
        .status-warning { text-align: center; color: #d97706; font-weight: 600; font-size: 0.95rem; margin-bottom: 8px; }
        .status-error { text-align: center; color: #dc2626; font-weight: 600; font-size: 0.95rem; margin-bottom: 8px; }
        
        label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9rem; color: #334155; }
        input[type="text"], textarea { width: 100%; border: 1px solid #cbd5e1; border-radius: 8px; padding: 10px; box-sizing: border-box; font-family: inherit; margin-bottom: 15px; outline: none; font-size: 0.95rem; }
        input[type="text"]:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.15); }
        input[readonly] { background-color: #f1f5f9; color: #64748b; cursor: not-allowed; }
        
        .image-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .img-slot { position: relative; border: 2px dashed #cbd5e1; border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #f8fafc; transition: all 0.2s; flex-direction: column; cursor: pointer; }
        .img-slot:hover { border-color: var(--primary); background: #f0fdf4; }
        .img-slot img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .img-slot span { font-size: 0.85rem; color: #64748b; text-align: center; pointer-events: none; padding: 10px; }
        
        .large-slot { aspect-ratio: 16/10; width: 100%; margin-bottom: 10px; border-style: solid; border-width: 2px; }
        .small-slot { aspect-ratio: 1; }

        .btn-add-img { width: 100%; background: white; color: var(--primary); border: 2px dashed var(--primary); padding: 10px; border-radius: 12px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: 0.3s; margin-bottom: 20px; }
        .btn-add-img:hover { background: #f0fdf4; }

        .btn-submit { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-submit:hover:not(:disabled) { background: var(--primary-dark); transform: translateY(-1px); }
        .btn-submit:disabled { background: #cbd5e1; color: #94a3b8; cursor: not-allowed; }
        .loader { display: none; text-align: center; margin-top: 15px; font-size: 0.9rem; color: var(--primary-dark); font-weight: bold; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid var(--primary); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; margin-bottom: 5px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ---------- CSS สำหรับ Popup เลือกรูปภาพ ---------- */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; opacity: 0; transition: opacity 0.2s; }
        .modal-overlay.show { display: flex; opacity: 1; }
        .modal-content-custom { background: white; border-radius: 16px; padding: 24px; width: 85%; max-width: 320px; text-align: center; transform: translateY(20px); transition: transform 0.2s; box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
        .modal-overlay.show .modal-content-custom { transform: translateY(0); }
        
        .btn-modal { width: 100%; background: white; color: var(--primary); border: 2px solid var(--primary); padding: 12px; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.2s; margin-bottom: 10px; }
        .btn-modal:hover { background: #f0fdf4; }
        .btn-cancel { border-color: #cbd5e1; color: #64748b; margin-bottom: 0; }
        /* -------------------------------------------------- */
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <img src="https://img2.pic.in.th/pic/71f81565dc59a7f9545542493a5514ab.png" alt="Logo" class="form-logo">
            <h2>เทศบาลตำบลตันหยงมัส</h2>
            <small class="text-muted">ระบบรายงานปฏิบัติงานชุมชน</small>
        </div>
        
        <div class="user-box">
            <div id="loadingStatus" class="status-loading">
                <span class="spinner-border spinner-border-sm" role="status"></span> กำลังเริ่มระบบ...
            </div>
            
            <div id="employeeDetails" style="display: none;">
                <label>ชื่อ-สกุล</label>
                <input type="text" id="empNameInput" placeholder="ระบุชื่อ-นามสกุล">
                
                <label>พื้นที่รับผิดชอบ</label>
                <input type="text" id="empAreaInput" placeholder="ระบุพื้นที่ (เช่น หมู่ 1)">
            </div>
        </div>

        <label>รายละเอียดการปฏิบัติงาน</label>
        <textarea id="task" rows="2" placeholder="ระบุรายละเอียดงาน (ถ้ามี)"></textarea>

        <label>รูปภาพประกอบ (สูงสุด 5 รูป)</label>
        <div id="imageContainer">
            </div>

        <button type="button" id="addMoreImgBtn" class="btn-add-img" onclick="addMoreImageSlot()">
            + เพิ่มเติมรูปภาพ (อีกสูงสุด 4 รูป)
        </button>

        <button id="btn" class="btn-submit" onclick="sendReport()" disabled>🚀 ส่งรายงาน</button>
        <div id="loader" class="loader">
            <span class="spinner-border spinner-border-sm"></span> กำลังประมวลผลรูปและส่งข้อมูล...
        </div>
    </div>

    <div id="imageSourceModal" class="modal-overlay">
        <div class="modal-content-custom">
            <h5 style="margin-top: 0; margin-bottom: 20px; color: var(--primary-dark); font-weight: bold;">แหล่งที่มารูปภาพ</h5>
            <button class="btn-modal" onclick="triggerFileInput('camera')">📷 ถ่ายรูปจากกล้อง</button>
            <button class="btn-modal" onclick="triggerFileInput('gallery')">🖼️ เลือกจากอัลบั้ม</button>
            <button class="btn-modal btn-cancel" onclick="closeImageModal()">❌ ยกเลิก</button>
        </div>
    </div>

    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;" onchange="handleFileSelected(this)">
    <input type="file" id="galleryInput" accept="image/*" style="display: none;" onchange="handleFileSelected(this)">
    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbymBbVxK84pLkluL8SZ7QbbJ5RM-ewxnHUuxyTZmUDEJeWt2Jv5ZkFlPUnS7xmnu5rUJA/exec'; 
        const LIFF_ID = '2009731527-wia9Oe2M'; 

        let imagesArray = []; 
        let lineUserId = "";
        let cachedLocation = null;
        const MAX_IMAGES = 5;
        let currentEditingIndex = null; // ตัวแปรเก็บว่ากำลังแก้ไขกล่องรูปภาพช่องไหนอยู่

        function startTrackingLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    pos => { cachedLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude }; },
                    err => console.warn("GPS ล่าช้า"),
                    { enableHighAccuracy: true }
                );
            }
        }

        async function init() {
            startTrackingLocation();
            addMoreImageSlot();

            try {
                const loadingStatus = document.getElementById('loadingStatus');
                await liff.init({ liffId: LIFF_ID });
                
                if (liff.isLoggedIn()) {
                    loadingStatus.innerHTML = '<span class="spinner-border spinner-border-sm"></span> กำลังตรวจสอบฐานข้อมูลพนักงาน...';
                    const profile = await liff.getProfile();
                    lineUserId = profile.userId; 
                    
                    document.getElementById('empNameInput').value = profile.displayName;
                    document.getElementById('employeeDetails').style.display = 'block';
                    
                    checkEmployeeFromDatabase(lineUserId);
                } else {
                    liff.login();
                }
            } catch (err) {
                console.error('LIFF Error:', err);
                document.getElementById('loadingStatus').innerHTML = '<span class="status-error">❌ โหลดระบบ LINE ไม่สำเร็จ</span>';
            }
        }

        async function checkEmployeeFromDatabase(userId) {
            const loadingStatus = document.getElementById('loadingStatus');
            const empNameInput = document.getElementById('empNameInput');
            const empAreaInput = document.getElementById('empAreaInput');
            const submitBtn = document.getElementById('btn');

            try {
                const res = await fetch(`${GAS_URL}?action=getEmployee&lineId=${userId}`);
                const data = await res.json();

                if (data.found) {
                    loadingStatus.className = 'status-success';
                    loadingStatus.innerText = "✅ ยืนยันตัวตนสำเร็จ";
                    empNameInput.value = data.name;
                    empAreaInput.value = data.area;
                    empNameInput.readOnly = true;
                    empAreaInput.readOnly = true;
                } else {
                    loadingStatus.className = 'status-warning';
                    loadingStatus.innerText = "👋 ลงทะเบียนใหม่: กรุณากรอกชื่อและพื้นที่";
                    empNameInput.readOnly = false;
                    empAreaInput.readOnly = false;
                }
                submitBtn.disabled = false;
            } catch (err) {
                loadingStatus.className = 'status-error';
                loadingStatus.innerText = "⚠️ ติดต่อฐานข้อมูลไม่ได้ (โหมดฉุกเฉิน: กรอกข้อมูลเอง)";
                empNameInput.readOnly = false;
                empAreaInput.readOnly = false;
                submitBtn.disabled = false;
            }
        }

        // ---------- ระบบจัดการ Popup เลือกรูปภาพ ----------
        function openImageSourceModal(index) {
            currentEditingIndex = index;
            document.getElementById('imageSourceModal').classList.add('show');
        }

        function closeImageModal() {
            document.getElementById('imageSourceModal').classList.remove('show');
            currentEditingIndex = null;
        }

        function triggerFileInput(source) {
            document.getElementById('imageSourceModal').classList.remove('show');
            if (source === 'camera') {
                document.getElementById('cameraInput').click(); // เรียกกล้อง
            } else {
                document.getElementById('galleryInput').click(); // เรียกอัลบั้ม
            }
        }

        // เมื่อผู้ใช้เลือกไฟล์จากกล้องหรืออัลบั้มเสร็จแล้ว
        async function handleFileSelected(input) {
            if (currentEditingIndex !== null && input.files && input.files[0]) {
                await processImage(input, currentEditingIndex);
            }
            input.value = ''; // รีเซ็ต input ให้เลือกรูปเดิมซ้ำได้ถัดไป
        }
        // --------------------------------------------------

        function addMoreImageSlot() {
            const container = document.getElementById('imageContainer');
            const btn = document.getElementById('addMoreImgBtn');
            const currentCount = container.querySelectorAll('.img-slot').length;

            if (currentCount >= MAX_IMAGES) return;

            const index = currentCount;
            const slot = document.createElement('div');
            slot.id = `slot-${index}`;
            // สั่งให้กล่องเมื่อกดแล้วเปิด Popup ตัวเลือก
            slot.onclick = () => openImageSourceModal(index);
            
            if (index === 0) {
                slot.className = 'img-slot large-slot';
                slot.innerHTML = `<span>📷 กดเพื่อเพิ่มรูปหลัก (1)</span>`;
                container.appendChild(slot);
            } else {
                let grid = document.getElementById('small-grid');
                if (!grid) {
                    grid = document.createElement('div');
                    grid.id = 'small-grid';
                    grid.className = 'image-grid';
                    container.appendChild(grid);
                }
                slot.className = 'img-slot small-slot';
                slot.innerHTML = `<span>📷 รูปที่ ${index + 1}</span>`;
                grid.appendChild(slot);
            }

            if (currentCount + 1 >= MAX_IMAGES) {
                btn.style.display = 'none';
            } else {
                btn.innerText = `+ เพิ่มเติมรูปภาพ (เหลืออีก ${MAX_IMAGES - (currentCount + 1)} รูป)`;
            }
        }

        async function processImage(input, index) {
            const slot = document.getElementById(`slot-${index}`);
            const originalHTML = slot.innerHTML;
            slot.innerHTML = '<div class="spinner"></div><span style="color:var(--primary); font-weight:bold;">กำลังฝังลายน้ำ...</span>';

            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const base64 = await compressAndWatermark(e.target.result);
                    slot.innerHTML = `<img src="${base64}">`;
                    imagesArray[index] = base64;
                } catch (err) {
                    alert("ประมวลผลรูปภาพไม่สำเร็จ");
                    slot.innerHTML = originalHTML;
                }
            };
            reader.readAsDataURL(file);
        }

        function compressAndWatermark(base64Str) {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64Str;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 1000;
                    let width = img.width;
                    let height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    // --- ฝังลายน้ำ 1 บรรทัด (วันที่/เวลา) ---
                    const now = new Date();
                    const dateStr = now.toLocaleDateString('th-TH');
                    const timeStr = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
                    const watermarkText = `วันที่: ${dateStr} เวลา ${timeStr} น.`;

                    const fontSize = Math.max(14, width * 0.035);
                    const padding = fontSize * 0.6; 
                    const barHeight = fontSize + (padding * 2); 

                    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                    ctx.fillRect(0, height - barHeight, width, barHeight);

                    ctx.fillStyle = '#ffffff';
                    ctx.font = `500 ${fontSize}px 'Sarabun', sans-serif`;
                    ctx.textAlign = 'left';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(watermarkText, 15, height - (barHeight / 2));

                    resolve(canvas.toDataURL('image/jpeg', 0.8));
                };
            });
        }

        function sendReport() {
            const name = document.getElementById('empNameInput').value.trim();
            const area = document.getElementById('empAreaInput').value.trim();
            const task = document.getElementById('task').value.trim() || "-";
            const finalImages = imagesArray.filter(img => img);

            if (!name || !area) return alert("กรุณาระบุชื่อและพื้นที่");
            if (finalImages.length === 0) return alert("กรุณาใส่รูปภาพอย่างน้อย 1 รูป");

            const btn = document.getElementById('btn');
            const loader = document.getElementById('loader');
            btn.disabled = true;
            loader.style.display = 'block';

            const payload = {
                employeeName: name,
                employeeArea: area,
                lineId: lineUserId,
                task: task,
                latitude: cachedLocation ? cachedLocation.lat : 0,
                longitude: cachedLocation ? cachedLocation.lng : 0,
                images: finalImages
            };

            fetch(GAS_URL, { 
                method: 'POST', 
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify(payload) 
            }).then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    alert("✅ ส่งรายงานสำเร็จ!");
                    liff.closeWindow();
                } else {
                    alert('❌ เกิดข้อผิดพลาดจากเซิร์ฟเวอร์: ' + data.message);
                    btn.disabled = false;
                    loader.style.display = 'none';
                }
            }).catch(err => {
                alert("เกิดข้อผิดพลาดในการส่งข้อมูล");
                btn.disabled = false;
                loader.style.display = 'none';
            });
        }

        window.onload = init;
    </script>
</body>
</html>
